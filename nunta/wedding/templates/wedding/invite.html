{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitație Nuntă</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <div class="container mt-5 text-center">
        <h1 class="mb-4 title">💍 Vă Invităm la Nunta Noastră! 💍</h1>

        <!-- Slider cu imagini -->
        <div id="carouselExample" class="carousel slide mb-4 shadow-lg" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="{% static 'images/imagine1.jpg' %}" class="d-block w-100 rounded" alt="Imagine 1">
                </div>
                <div class="carousel-item">
                    <img src="{% static 'images/imagine2.jpg' %}" class="d-block w-100 rounded" alt="Imagine 2">
                </div>
                <div class="carousel-item">
                    <img src="{% static 'images/imagine3.jpg' %}" class="d-block w-100 rounded" alt="Imagine 3">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
        </div>

        <!-- Locația nunții -->
        <div class="location-card p-4 mt-4">
            <h3>📍 Locația Evenimentului</h3>
            <p>Nunta noastră va avea loc la <strong>Castelul Bran</strong>, într-un cadru de poveste! 🌿✨</p>
        </div>

        <!-- Formular RSVP -->
        <div class="rsvp-form p-4 mt-4">
            <h3>🎉 Confirmați Prezența</h3>
            <form method="post">
                {% csrf_token %}
                <input type="text" name="name" class="form-control mb-3" placeholder="Numele dvs." required>
                <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
                <textarea name="message" class="form-control mb-3" placeholder="Mesaj (opțional)"></textarea>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="attending" id="attending">
                    <label class="form-check-label" for="attending">Voi participa</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Trimite</button>
            </form>
        </div>
    </div>

</body>
</html>
